<div class="flex h-screen bg-gray-50 font-sans">

  <!-- Header -->
  <div class="fixed top-0 left-0 right-0 z-10 bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold text-gray-900 flex items-center gap-2">
        <ng-icon name="lucideGavel" class="text-blue-600" size="22" />
        EvalLab
      </h1>
      <p class="text-xs text-gray-400">AI model evaluation for information integrity</p>
    </div>

    <!-- Mode tabs -->
    <div class="flex gap-1 bg-gray-100 p-1 rounded-lg">
      <button
        (click)="mode = 'research'"
        class="px-4 py-1.5 rounded-md text-sm font-medium transition-colors"
        [class.bg-white]="mode === 'research'"
        [class.text-gray-900]="mode === 'research'"
        [class.shadow-sm]="mode === 'research'"
        [class.text-gray-500]="mode !== 'research'"
        [class.hover:text-gray-700]="mode !== 'research'"
      >
        Research Eval
      </button>
      <button
        (click)="mode = 'eval'"
        class="px-4 py-1.5 rounded-md text-sm font-medium transition-colors"
        [class.bg-white]="mode === 'eval'"
        [class.text-gray-900]="mode === 'eval'"
        [class.shadow-sm]="mode === 'eval'"
        [class.text-gray-500]="mode !== 'eval'"
        [class.hover:text-gray-700]="mode !== 'eval'"
      >
        Model Eval
      </button>
    </div>
  </div>

  <!-- Main layout -->
  <div class="flex w-full pt-16 h-full">

    <!-- Sidebar -->
    <div class="relative shrink-0 h-full flex">
      <!-- Collapsible sidebar content -->
      <div class="overflow-hidden border-r border-gray-200 bg-white"
        [style.width]="sidebarCollapsed ? '0px' : '400px'"
        style="transition: width 0.2s ease;">
        <div class="w-[400px] h-full overflow-y-auto">
          <app-run-panel
            *ngIf="mode === 'eval'"
            [results]="results"
            (loadingChange)="onLoadingChange($event)"
            (resultsReady)="onResultsReady($event)"
          />
          <app-research-panel
            *ngIf="mode === 'research'"
            [history]="researchHistory"
            (loadingChange)="onResearchLoadingChange($event)"
            (resultsReady)="onResearchResultsReady($event)"
            (historySelect)="onHistorySelect($event)"
            (historyTagged)="onHistoryTagged($event)"
            (experimentReady)="onExperimentReady($event)"
          />
        </div>
      </div>
      <!-- Toggle tab -->
      <div class="flex items-start pt-24 shrink-0">
        <button (click)="sidebarCollapsed = !sidebarCollapsed"
          class="h-10 w-4 bg-white border border-l-0 border-gray-200 rounded-r flex items-center justify-center
                 text-gray-300 hover:text-gray-500 hover:bg-gray-50 shadow-sm text-[10px]">
          {{ sidebarCollapsed ? '▶' : '◀' }}
        </button>
      </div>
    </div>

    <!-- Main content -->
    <div class="flex-1 overflow-y-auto flex flex-col">

      <!-- Research view toggle -->
      <div *ngIf="mode === 'research'" class="flex gap-1 bg-gray-100 p-0.5 rounded-lg self-start m-4 mb-0">
        <button
          (click)="researchView = 'results'"
          class="px-4 py-1.5 rounded-md text-xs font-medium transition-colors"
          [class.bg-white]="researchView === 'results'"
          [class.shadow-sm]="researchView === 'results'"
          [class.text-gray-900]="researchView === 'results'"
          [class.text-gray-500]="researchView !== 'results'"
        >Results</button>
        <button
          (click)="researchView = 'trends'"
          class="px-4 py-1.5 rounded-md text-xs font-medium transition-colors"
          [class.bg-white]="researchView === 'trends'"
          [class.shadow-sm]="researchView === 'trends'"
          [class.text-gray-900]="researchView === 'trends'"
          [class.text-gray-500]="researchView !== 'trends'"
        >Trends</button>
        <button
          (click)="researchView = 'reviews'"
          class="px-4 py-1.5 rounded-md text-xs font-medium transition-colors"
          [class.bg-white]="researchView === 'reviews'"
          [class.shadow-sm]="researchView === 'reviews'"
          [class.text-gray-900]="researchView === 'reviews'"
          [class.text-gray-500]="researchView !== 'reviews'"
        >Reviews</button>
        <button
          (click)="researchView = 'import'"
          class="px-4 py-1.5 rounded-md text-xs font-medium transition-colors"
          [class.bg-white]="researchView === 'import'"
          [class.shadow-sm]="researchView === 'import'"
          [class.text-gray-900]="researchView === 'import'"
          [class.text-gray-500]="researchView !== 'import'"
        >Import</button>
      </div>

      <app-results-table
        *ngIf="mode === 'eval'"
        [results]="results"
        [loading]="loading"
      />
      <app-research-results
        *ngIf="mode === 'research' && researchView === 'results'"
        [results]="researchResults"
        [loading]="researchLoading"
      />
      <app-research-trends
        *ngIf="mode === 'research' && researchView === 'trends'"
        [history]="researchHistory"
        [currentResults]="researchResults"
      />
      <app-human-review-dashboard
        *ngIf="mode === 'research' && researchView === 'reviews'"
        [experimentId]="currentExperimentId"
      />
      <app-external-packages
        *ngIf="mode === 'research' && researchView === 'import'"
        class="flex-1 overflow-hidden"
      />
    </div>

  </div>
</div>
